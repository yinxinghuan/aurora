<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Aurora</title>
<style>
  :root {
    --bg-top: #06081a;
    --bg-bot: #0d1530;
    --brand-fg: rgba(255,255,255,0.78);
    --tap-glow: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    border-radius: 24px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bot) 100%);
    position: relative;
  }
  #stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .switcher {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 5px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.22);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }
  .switcher-btn {
    width: 36px;
    height: 36px;
    border: 0;
    background: transparent;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: rgba(232, 236, 226, 0.55);
    opacity: 1;
    transition: color 0.32s ease, background 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 0;
  }
  .switcher-btn:hover { color: rgba(232, 236, 226, 0.85); }
  .switcher-btn.is-active {
    color: rgba(248, 250, 240, 0.96);
    background: rgba(255, 255, 255, 0.16);
  }
  .switcher-btn svg { display: block; }

  .brand {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 14px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 10;
  }
  .brand-title {
    font-size: 11px;
    letter-spacing: 0.42em;
    color: var(--brand-fg);
    font-weight: 500;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(0,0,0,0.55);
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="switcher" id="switcher" role="group" aria-label="Theme">
    <button type="button" class="switcher-btn is-active" data-theme="polar" aria-label="Green Polar" aria-pressed="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
      </svg>
    </button>
    <button type="button" class="switcher-btn" data-theme="dusk" aria-label="Pink Dusk" aria-pressed="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/>
      </svg>
    </button>
    <button type="button" class="switcher-btn" data-theme="moon" aria-label="Blue Moon" aria-pressed="false">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <div class="brand">
    <div class="brand-title">A U R O R A</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;

  const THEMES = {
    polar: {
      bgTop: '#02050f',
      bgBot: '#08142a',
      ribbons: [
        { hue: 145, sat: 80, base: 50, top: 62 },
        { hue: 165, sat: 75, base: 45, top: 65 },
        { hue: 110, sat: 70, base: 50, top: 62 }
      ],
      starColor: 'rgba(220,240,255,'
    },
    dusk: {
      bgTop: '#1a0820',
      bgBot: '#2a0d35',
      ribbons: [
        { hue: 320, sat: 70, base: 55, top: 65 },
        { hue: 290, sat: 65, base: 50, top: 62 },
        { hue: 350, sat: 75, base: 58, top: 68 }
      ],
      starColor: 'rgba(255,220,240,'
    },
    moon: {
      bgTop: '#02061a',
      bgBot: '#081230',
      ribbons: [
        { hue: 220, sat: 75, base: 55, top: 65 },
        { hue: 260, sat: 60, base: 50, top: 60 },
        { hue: 200, sat: 80, base: 58, top: 68 }
      ],
      starColor: 'rgba(220,235,255,'
    }
  };

  let currentTheme = 'polar';
  let theme = THEMES[currentTheme];

  const offCanvas = document.createElement('canvas');
  const offCtx = offCanvas.getContext('2d');

  const audio = (() => {
    let ac = null;
    let masterGain = null;
    let started = false;
    let padHandle = null;
    let activeVoices = 0;
    const VOICE_CAP = 5;
    let lastVoiceAt = 0;

    const PADS = {
      polar: { freqs: [138.59, 207.65, 329.63], cutoff: 600 },
      dusk:  { freqs: [174.61, 261.63, 440.00], cutoff: 700 },
      moon:  { freqs: [110.00, 164.81, 261.63], cutoff: 520 }
    };
    const PENTAS = {
      polar: [554.37, 622.25, 739.99, 830.61, 932.33, 1108.73],
      dusk:  [698.46, 783.99, 880.00, 1046.50, 1174.66, 1396.91],
      moon:  [880.00, 1046.50, 1174.66, 1318.51, 1567.98, 2093.00]
    };

    function ensureContext() {
      if (!ac) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        ac = new AC();
        masterGain = ac.createGain();
        masterGain.gain.value = 1;
        masterGain.connect(ac.destination);
      }
      if (!started) {
        if (ac.state !== 'running') ac.resume();
        started = true;
      }
      return ac.state === 'running';
    }

    function buildPad(themeName) {
      const cfg = PADS[themeName];
      const t = ac.currentTime;
      const out = ac.createGain();
      out.gain.value = 0;

      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = cfg.cutoff;
      filt.Q.value = 0.6;
      filt.connect(out);

      const oscs = cfg.freqs.map((f, i) => {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.value = f * (1 + (Math.random() - 0.5) * 0.004);
        const g = ac.createGain();
        g.gain.value = (1 / cfg.freqs.length) * (1 - i * 0.15);
        o.connect(g); g.connect(filt);
        o.start(t);
        return { o, g };
      });

      const lfo = ac.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.08;
      const lfoGain = ac.createGain();
      lfoGain.gain.value = 0.012;
      lfo.connect(lfoGain);
      lfoGain.connect(out.gain);
      lfo.start(t);

      out.connect(masterGain);
      out.gain.setValueAtTime(0, t);
      out.gain.linearRampToValueAtTime(0.045, t + 2.5);

      return { out, filt, oscs, lfo, lfoGain };
    }

    function destroyPad(handle, fadeMs = 1500) {
      if (!handle) return;
      const t = ac.currentTime;
      handle.out.gain.cancelScheduledValues(t);
      handle.out.gain.setValueAtTime(handle.out.gain.value, t);
      handle.out.gain.linearRampToValueAtTime(0, t + fadeMs / 1000);
      const stopAt = t + fadeMs / 1000 + 0.05;
      handle.oscs.forEach(({ o }) => { try { o.stop(stopAt); } catch(e){} });
      try { handle.lfo.stop(stopAt); } catch(e){}
      setTimeout(() => {
        try {
          handle.oscs.forEach(({ o, g }) => { o.disconnect(); g.disconnect(); });
          handle.lfo.disconnect(); handle.lfoGain.disconnect();
          handle.filt.disconnect(); handle.out.disconnect();
        } catch(e){}
      }, fadeMs + 200);
    }

    return {
      onFirstGesture(themeName) {
        if (!ensureContext()) return;
        setTimeout(() => {
          if (!ac || ac.state !== 'running') return;
          if (padHandle) return;
          padHandle = buildPad(themeName);
        }, 800);
      },
      switchPad(newTheme) {
        if (!ac || ac.state !== 'running') return;
        if (!padHandle) {
          padHandle = buildPad(newTheme);
          return;
        }
        destroyPad(padHandle, 1400);
        padHandle = buildPad(newTheme);
      },
      twinkle(themeName) {
        if (!ac || ac.state !== 'running') return;
        if (activeVoices >= VOICE_CAP) return;
        const now = performance.now();
        if (now - lastVoiceAt < 220) return;
        if (Math.random() < 0.18) return;
        lastVoiceAt = now;

        const penta = PENTAS[themeName];
        const f = penta[Math.floor(Math.random() * penta.length)];
        const t = ac.currentTime;

        const g = ac.createGain();
        g.gain.value = 0;

        const filt = ac.createBiquadFilter();
        filt.type = 'lowpass';
        filt.frequency.value = 7500;
        filt.Q.value = 0.5;

        const o1 = ac.createOscillator();
        o1.type = 'sine';
        o1.frequency.value = f * (1 + (Math.random() - 0.5) * 0.003);

        const o2 = ac.createOscillator();
        o2.type = 'sine';
        o2.frequency.value = f * 2;
        const g2 = ac.createGain();
        g2.gain.value = 0.28;

        o1.connect(g);
        o2.connect(g2); g2.connect(g);
        g.connect(filt); filt.connect(masterGain);

        const peak = 0.075 + Math.random() * 0.035;
        const decay = 0.85 + Math.random() * 0.55;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(peak, t + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t + decay);

        o1.start(t); o2.start(t);
        o1.stop(t + decay + 0.05);
        o2.stop(t + decay + 0.05);

        activeVoices++;
        setTimeout(() => {
          activeVoices--;
          try { o1.disconnect(); o2.disconnect(); g.disconnect(); g2.disconnect(); filt.disconnect(); } catch(e){}
        }, (decay + 0.1) * 1000);
      }
    };
  })();

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    offCanvas.width = Math.floor(W * DPR);
    offCanvas.height = Math.floor(H * DPR);
    offCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    rebuildStars();
  }

  let stars = [];
  function rebuildStars() {
    stars = [];
    const n = Math.floor((W * H) / 9000);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.85,
        r: Math.random() * 1.2 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.4
      });
    }
  }

  const ribbons = [];
  const MAX_RIBBONS = 7;

  function spawnRibbon(xCenter, intensity = 1, fromTouch = false) {
    if (ribbons.length >= MAX_RIBBONS) {
      ribbons.shift();
    }
    const palette = theme.ribbons[Math.floor(Math.random() * theme.ribbons.length)];
    const cps = 11;
    const path = [];
    for (let i = 0; i < cps; i++) {
      path.push({
        t: i / (cps - 1),
        offsetX: (Math.random() - 0.5) * 18,
        phase: Math.random() * Math.PI * 2,
        amp: 12 + Math.random() * 35,
        freq: 0.18 + Math.random() * 0.35
      });
    }
    const topY = -H * 0.08 + Math.random() * H * 0.05;
    const botY = H * 0.65 + Math.random() * H * 0.4;
    ribbons.push({
      x: xCenter,
      vx: (Math.random() - 0.5) * 0.1,
      width: 95 + Math.random() * 90,
      topY,
      botY,
      age: 0,
      life: fromTouch ? 9 + Math.random() * 5 : 16 + Math.random() * 10,
      intensity,
      palette,
      path,
      driftPhase: Math.random() * Math.PI * 2
    });
  }

  let lastIdleSpawn = 0;
  let idleSpawnBand = 0;
  const IDLE_SPAWN_INTERVAL = 1500;
  const TARGET_IDLE_RIBBONS = 5;
  const IDLE_BAND_COUNT = 5;

  let lastDraw = 0;
  const FRAME_MS = 1000 / 60;
  let raf = 0;

  function frame(t) {
    if (t - lastDraw < FRAME_MS - 1) {
      raf = requestAnimationFrame(frame);
      return;
    }
    const dt = Math.min(1 / 30, (t - lastDraw) / 1000);
    lastDraw = t;

    if (ribbons.length < TARGET_IDLE_RIBBONS && t - lastIdleSpawn > IDLE_SPAWN_INTERVAL) {
      const bandW = W / IDLE_BAND_COUNT;
      const bx = (idleSpawnBand + Math.random()) * bandW;
      idleSpawnBand = (idleSpawnBand + 2) % IDLE_BAND_COUNT;
      spawnRibbon(bx, 0.6 + Math.random() * 0.35, false);
      lastIdleSpawn = t;
    }

    drawScene(t / 1000, dt);
    raf = requestAnimationFrame(frame);
  }

  function drawScene(time, dt) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, theme.bgTop);
    grad.addColorStop(1, theme.bgBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    for (const s of stars) {
      s.twinkle += dt * s.speed;
      const a = 0.4 + 0.4 * Math.sin(s.twinkle);
      ctx.fillStyle = theme.starColor + a.toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    offCtx.clearRect(0, 0, W, H);
    offCtx.save();
    offCtx.globalCompositeOperation = 'lighter';
    for (let i = ribbons.length - 1; i >= 0; i--) {
      const r = ribbons[i];
      r.age += dt;
      r.x += r.vx;
      r.driftPhase += dt * 0.35;
      const lifeT = r.age / r.life;
      let alpha;
      if (lifeT < 0.2) alpha = lifeT / 0.2;
      else if (lifeT > 0.7) alpha = Math.max(0, (1 - lifeT) / 0.3);
      else alpha = 1;
      alpha *= r.intensity;

      drawRibbon(offCtx, r, time, alpha);

      if (r.age >= r.life) ribbons.splice(i, 1);
    }
    offCtx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'blur(18px)';
    ctx.globalAlpha = 0.6;
    ctx.drawImage(offCanvas, 0, 0, W, H);
    ctx.filter = 'blur(6px)';
    ctx.globalAlpha = 0.7;
    ctx.drawImage(offCanvas, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawRibbon(c, r, time, alpha) {
    if (alpha <= 0.001) return;
    const pts = r.path.length;
    const xs = new Array(pts);
    const ys = new Array(pts);
    const yRange = r.botY - r.topY;
    for (let i = 0; i < pts; i++) {
      const p = r.path[i];
      const sway = Math.sin(time * p.freq + p.phase + r.driftPhase) * p.amp;
      xs[i] = r.x + p.offsetX + sway;
      ys[i] = r.topY + p.t * yRange;
    }

    const SUB = 10;
    const sampX = [];
    const sampY = [];
    function catmull(p0, p1, p2, p3, t) {
      const t2 = t * t, t3 = t2 * t;
      return 0.5 * ((2 * p1) +
        (-p0 + p2) * t +
        (2*p0 - 5*p1 + 4*p2 - p3) * t2 +
        (-p0 + 3*p1 - 3*p2 + p3) * t3);
    }
    for (let i = 0; i < pts - 1; i++) {
      const x0 = xs[i === 0 ? 0 : i - 1];
      const x1 = xs[i];
      const x2 = xs[i + 1];
      const x3 = xs[i + 2 < pts ? i + 2 : pts - 1];
      const y0 = ys[i === 0 ? 0 : i - 1];
      const y1 = ys[i];
      const y2 = ys[i + 1];
      const y3 = ys[i + 2 < pts ? i + 2 : pts - 1];
      for (let s = 0; s < SUB; s++) {
        const t = s / SUB;
        sampX.push(catmull(x0, x1, x2, x3, t));
        sampY.push(catmull(y0, y1, y2, y3, t));
      }
    }
    sampX.push(xs[pts - 1]);
    sampY.push(ys[pts - 1]);

    const pal = r.palette;
    const layers = 2;
    for (let L = 0; L < layers; L++) {
      const w = r.width * (L === 0 ? 1.6 : 0.85);
      const layerAlpha = alpha * (L === 0 ? 0.22 : 0.55);

      const grad = c.createLinearGradient(0, r.topY, 0, r.botY);
      const top = pal.top + (L === 0 ? 0 : 4);
      const bot = pal.base - (L === 0 ? 0 : 4);
      grad.addColorStop(0, `hsla(${pal.hue}, ${pal.sat}%, ${top}%, 0)`);
      grad.addColorStop(0.14, `hsla(${pal.hue - 4}, ${pal.sat}%, ${top}%, ${layerAlpha * 0.8})`);
      grad.addColorStop(0.42, `hsla(${pal.hue + 6}, ${pal.sat}%, ${(top + bot) / 2}%, ${layerAlpha})`);
      grad.addColorStop(0.78, `hsla(${pal.hue + 14}, ${pal.sat - 10}%, ${bot}%, ${layerAlpha * 0.45})`);
      grad.addColorStop(1, `hsla(${pal.hue + 22}, ${pal.sat - 20}%, ${bot - 8}%, 0)`);
      c.fillStyle = grad;

      c.beginPath();
      c.moveTo(sampX[0] - w / 2, sampY[0]);
      for (let i = 1; i < sampX.length; i++) {
        c.lineTo(sampX[i] - w / 2, sampY[i]);
      }
      for (let i = sampX.length - 1; i >= 0; i--) {
        c.lineTo(sampX[i] + w / 2, sampY[i]);
      }
      c.closePath();
      c.fill();
    }
  }

  let lastTouchSpawn = 0;
  let firstGesture = false;
  function onPointerDown(e) {
    if (!firstGesture) { firstGesture = true; audio.onFirstGesture(currentTheme); }
    const x = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? W / 2;
    if (performance.now() - lastTouchSpawn < 90) return;
    lastTouchSpawn = performance.now();
    spawnRibbon(x, 1, true);
    audio.twinkle(currentTheme);
  }
  let isDragging = false;
  function onPointerMove(e) {
    if (!isDragging) return;
    if (performance.now() - lastTouchSpawn < 110) return;
    lastTouchSpawn = performance.now();
    const x = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? W / 2;
    spawnRibbon(x, 0.85, true);
    audio.twinkle(currentTheme);
  }

  canvas.addEventListener('pointerdown', (e) => { isDragging = true; onPointerDown(e); });
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup',   () => { isDragging = false; });
  canvas.addEventListener('pointercancel', () => { isDragging = false; });
  canvas.addEventListener('pointerleave',  () => { isDragging = false; });

  document.getElementById('switcher').addEventListener('pointerdown', (e) => {
    const t = e.target.closest('.switcher-btn');
    if (!t) return;
    const name = t.dataset.theme;
    if (!THEMES[name]) return;
    currentTheme = name;
    theme = THEMES[name];
    document.querySelectorAll('.switcher-btn').forEach(d => {
      const on = d === t;
      d.classList.toggle('is-active', on);
      d.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    if (!firstGesture) { firstGesture = true; audio.onFirstGesture(name); }
    else audio.switchPad(name);
    e.stopPropagation();
  });

  window.addEventListener('resize', resize);
  resize();
  raf = requestAnimationFrame(frame);
})();
</script>
</body>
</html>
